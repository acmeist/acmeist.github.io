        <h1 class="title">CentOS 7 清理开机启动项</h1>
        <div class="stuff">
            <span>三月 14, 2020</span>
            
  <ul class="post-tags-list" itemprop="keywords"><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/CentOS/" rel="tag">CentOS</a></li></ul>


        </div>
        <div class="content markdown">
            <p>在 CentOS7 的操作系统中，升级后，开机界面会显示多个启动项选项。现将低版内核选项去掉。</p>
<h1 id="查看当前系统内核"><a href="#查看当前系统内核" class="headerlink" title="查看当前系统内核"></a>查看当前系统内核</h1><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]<span class="comment"># uname -a</span></span><br></pre></td></tr></table></figure>
<p>返回结果：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">Linux localhost.localdomain 3.10.0-514.26.1.el7.x86_64 <span class="comment">#1 SMP Thu Jun 29 16:05:25 UTC 2017 x86_64 x86_64 x86_64 GNU/Linux</span></span><br></pre></td></tr></table></figure>
<p>根据显示结果来看。目前使用的内核为 <code>3.10.0-514.26.1.el7.x86_64</code></p>
<h1 id="查看当前已经安装的内核程序"><a href="#查看当前已经安装的内核程序" class="headerlink" title="查看当前已经安装的内核程序"></a>查看当前已经安装的内核程序</h1><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]<span class="comment"># rpm -qa | grep kernel</span></span><br></pre></td></tr></table></figure>
<p>返回结果：</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">kernel-3.10.0-514.21.1.el7.x86_64</span><br><span class="line">kernel-tools-3.10.0-514.26.1.el7.x86_64</span><br><span class="line">kernel-3.10.0-514.26.1.el7.x86_64</span><br><span class="line">kernel-3.10.0-514.el7.x86_64</span><br><span class="line">kernel-3.10.0-514.21.2.el7.x86_64</span><br><span class="line">kernel-tools-libs-3.10.0-514.26.1.el7.x86_64</span><br></pre></td></tr></table></figure>
<p>根据当前使用的内核，与已经安装的内核进行比对，删除其他内核包。</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">kernel-3.10.0-514.21.2.el7.x86_64</span><br><span class="line">kernel-3.10.0-514.21.1.el7.x86_64</span><br><span class="line">kernel-3.10.0-514.el7.x86_64</span><br></pre></td></tr></table></figure>
<h1 id="删除旧的内核包"><a href="#删除旧的内核包" class="headerlink" title="删除旧的内核包"></a>删除旧的内核包</h1><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">[root@localhost ~]<span class="comment"># yum -y remove kernel-3.10.0-514.el7.x86_64</span></span><br><span class="line">[root@localhost ~]<span class="comment"># yum -y remove kernel-3.10.0-514.21.1.el7.x86_64</span></span><br><span class="line">[root@localhost ~]<span class="comment"># yum -y remove kernel-3.10.0-514.21.2.el7.x86_64</span></span><br></pre></td></tr></table></figure>
<p>以上三步就可以完成清楚开机启动项的工作。</p>
